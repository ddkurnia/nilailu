<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seberapa Guna Lu Hari Ini?</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fef9c3, #fde68a);
  color:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* Emoji Background */
body::before {
  content:"😀 😭 🤡 😵 😤 😂 🤯 😎 🫠 😈";
  position:absolute;
  font-size:40px;
  opacity:0.08;
  width:200%;
  height:200%;
  line-height:60px;
  transform:rotate(-15deg);
}

.container {
  width:90%;
  max-width:420px;
  text-align:center;
  z-index:2;
}

/* Glass Card */
.card {
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

h1 {
  font-size:26px;
}

p {
  opacity:0.8;
}

/* Buttons */
button {
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:14px;
  background: linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  font-weight:bold;
  width:100%;
  font-size:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

button:active {
  transform:scale(0.97);
}

/* Inputs */
select, input[type=checkbox] {
  margin:6px;
}

.hidden { display:none; }

.result-box {
  font-size:22px;
  font-weight:bold;
}

.insight {
  margin-top:10px;
  font-style:italic;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<!-- LANDING -->
<div id="landing">
  <h1>Seberapa Guna Lu Hari Ini? 😈</h1>
  <p>Jawab jujur… kita nilai hidup lu 🔥</p>
  <button onclick="start()">Mulai</button>
</div>

<!-- INPUT -->
<div id="input" class="hidden">

<div class="card">
<p>Lu bangun kapan?</p>
<select id="bangun">
  <option value="20">🌅 Pagi (niat hidup)</option>
  <option value="10">☀️ Siang (ya gitu lah)</option>
  <option value="0">🌙 Malam (fix kacau)</option>
</select>
</div>

<div class="card">
<p>🌅 Pagi lu ngapain?</p>
<label><input type="checkbox" value="5"> ☕ ngopi doang</label><br>
<label><input type="checkbox" value="-5"> 😴 lanjut tidur</label><br>
<label><input type="checkbox" value="15"> 💻 kerja bentar</label><br>
<label><input type="checkbox" value="-10"> 📱 scroll</label><br>
<label><input type="checkbox" value="10"> 🏃 sok olahraga</label>
</div>

<div class="card">
<p>☀️ Siang?</p>
<label><input type="checkbox" value="-5"> 🍜 makan + rebahan</label><br>
<label><input type="checkbox" value="20"> 💻 kerja serius</label><br>
<label><input type="checkbox" value="-10"> 📱 scroll lagi</label><br>
<label><input type="checkbox" value="0"> 😵 bingung hidup</label><br>
<label><input type="checkbox" value="-5"> 🧠 pura-pura sibuk</label>
</div>

<div class="card">
<p>🌙 Malam?</p>
<label><input type="checkbox" value="-10"> 🎬 nonton lupa waktu</label><br>
<label><input type="checkbox" value="-15"> 📱 scroll tanpa tujuan</label><br>
<label><input type="checkbox" value="15"> 💻 lembur</label><br>
<label><input type="checkbox" value="10"> 🛌 tidur cepat</label><br>
<label><input type="checkbox" value="-5"> 🤡 overthinking</label>
</div>

<button onclick="hitung()">➡️ Berikutnya</button>

</div>

<!-- RESULT -->
<div id="result" class="hidden">

<div class="card">
<div class="result-box" id="score"></div>
<p id="roast"></p>
<p class="insight" id="insight"></p>
</div>

<button onclick="share()">🔥 Share</button>
<button onclick="location.reload()">🔁 Ulang</button>

</div>

</div>

<script>

function start(){
  landing.classList.add("hidden");
  input.classList.remove("hidden");
}

function hitung(){
  let total = 0;

  total += parseInt(bangun.value);

  document.querySelectorAll('#input input[type=checkbox]:checked')
    .forEach(cb => total += parseInt(cb.value));

  if(total < 0) total = 0;
  if(total > 100) total = 100;

  let title = "";
  let roast = "";
  let insight = "";

  if(total < 30){
    title = "NPC MODE 🤡";
    roast = "Seharian hidup… tapi kayak nggak ada tujuan 😭";
    insight = "Kalau hari lu diulang lagi besok, hidup lu bakal beda nggak?";
  }
  else if(total < 60){
    title = "SIBUK HALU 😵";
    roast = "Gerak banyak, hasil minim. Klasik.";
    insight = "Sibuk itu bukan bukti maju. Kadang cuma bukti lu lari dari fokus.";
  }
  else if(total < 80){
    title = "MASIH MANUSIA 🧍";
    roast = "Lumayan… nggak malu-maluin banget hari ini.";
    insight = "Lu udah di jalan yang bener… tapi jangan santai dulu.";
  }
  else{
    title = "OVERACHIEVER 😤";
    roast = "Lu kerja beneran… atau cuma cari validasi?";
    insight = "Produktif tanpa arah cuma bikin capek, bukan maju.";
  }

  score.innerText = total + "% - " + title;
  roastEl = document.getElementById("roast");
  roastEl.innerText = roast;

  insightEl = document.getElementById("insight");
  insightEl.innerText = "Hari ini buat lu:\n" + insight;

  input.classList.add("hidden");
  result.classList.remove("hidden");
}

function share(){
  let text = score.innerText + "\n" +
             roast.innerText + "\n" +
             insight.innerText +
             "\n\nCoba cek hidup lu juga 😈";

  if(navigator.share){
    navigator.share({text});
  } else {
    alert(text);
  }
}

</script>

</body>
</html>
