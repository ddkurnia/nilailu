<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seberapa Guna Lu Hari Ini?</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#fef08a,#fde68a);
  color:#111;
  overflow-y:auto;
}

/* Emoji background */
body::before{
  content:"😀 😂 🤡 😭 😤 😵 🤯 😎 😈";
  position:fixed;
  font-size:40px;
  opacity:0.08;
  width:200%;
  height:200%;
  transform:rotate(-15deg);
  z-index:0;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:2;
}

/* Glass card */
.card{
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:18px;
  margin-bottom:15px;
}

/* Option button */
.option{
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background:white;
  cursor:pointer;
  transition:0.2s;
}

.option.active{
  background:#22c55e;
  color:black;
  font-weight:bold;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  font-weight:bold;
  margin-top:10px;
}

/* Result */
.result{
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.insight{
  margin-top:10px;
  font-style:italic;
  opacity:0.8;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<!-- LANDING -->
<div id="landing">
  <h1>Seberapa Guna Lu Hari Ini? 😈</h1>
  <p>Jujur aja. Kita nilai hidup lu 🔥</p>
  <button onclick="start()">Mulai</button>
</div>

<!-- INPUT -->
<div id="input" class="hidden">

<div class="card">
<h3>Lu bangun kapan?</h3>
<div class="option" onclick="select(this,20)">🌅 Pagi</div>
<div class="option" onclick="select(this,10)">☀️ Siang</div>
<div class="option" onclick="select(this,0)">🌙 Malam</div>
</div>

<div class="card">
<h3>🌅 Pagi lu?</h3>
<div class="option" onclick="toggle(this,5)">☕ ngopi</div>
<div class="option" onclick="toggle(this,-5)">😴 tidur lagi</div>
<div class="option" onclick="toggle(this,15)">💻 kerja</div>
<div class="option" onclick="toggle(this,-10)">📱 scroll</div>
<div class="option" onclick="toggle(this,10)">🏃 olahraga</div>
</div>

<div class="card">
<h3>☀️ Siang?</h3>
<div class="option" onclick="toggle(this,-5)">🍜 rebahan</div>
<div class="option" onclick="toggle(this,20)">💻 kerja serius</div>
<div class="option" onclick="toggle(this,-10)">📱 scroll lagi</div>
<div class="option" onclick="toggle(this,0)">😵 bingung hidup</div>
</div>

<div class="card">
<h3>🌙 Malam?</h3>
<div class="option" onclick="toggle(this,-10)">🎬 nonton</div>
<div class="option" onclick="toggle(this,-15)">📱 scroll chaos</div>
<div class="option" onclick="toggle(this,15)">💻 lembur</div>
<div class="option" onclick="toggle(this,10)">🛌 tidur cepat</div>
</div>

<button onclick="hitung()">🔥 Nilai Gue</button>

</div>

<!-- RESULT -->
<div id="result" class="hidden">

<div class="card">
<div class="result" id="score"></div>
<p id="roast"></p>
<p class="insight" id="insight"></p>
</div>

<button onclick="share()">🔥 Share</button>
<button onclick="location.reload()">🔁 Ulang</button>

</div>

</div>

<script>

let total = 0;

function start(){
  landing.classList.add("hidden");
  input.classList.remove("hidden");
}

function select(el,val){
  let parent = el.parentNode;
  parent.querySelectorAll(".option").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  el.dataset.value = val;
}

function toggle(el,val){
  el.classList.toggle("active");
  el.dataset.value = val;
}

function hitung(){
  total = 0;

  document.querySelectorAll(".option.active").forEach(el=>{
    total += parseInt(el.dataset.value || 0);
  });

  if(total < 0) total = 0;
  if(total > 100) total = 100;

  let title="", roast="", insight="";

  if(total < 30){
    title="NPC MODE 🤡";
    roast="Seharian hidup… tapi kosong 😭";
    insight="Kalau besok sama aja, lu lagi hidup atau cuma lewat?";
  }
  else if(total < 60){
    title="SIBUK HALU 😵";
    roast="Gerak banyak, hasil nihil.";
    insight="Lu capek… tapi maju nggak?";
  }
  else if(total < 80){
    title="MASIH MANUSIA 🧍";
    roast="Lumayan lah… nggak malu.";
    insight="Udah oke… tapi masih bisa lebih.";
  }
  else{
    title="OVERACHIEVER 😤";
    roast="Lu kerja… atau kabur dari realita?";
    insight="Produktif tanpa arah = capek doang.";
  }

  score.innerText = total + "% - " + title;
  document.getElementById("roast").innerText = roast;
  document.getElementById("insight").innerText = "Kata-kata Hari ini buat lu:\n" + insight;

  input.classList.add("hidden");
  result.classList.remove("hidden");
}

function share(){
  let text = score.innerText + "\n" +
             roast.innerText + "\n" +
             insight.innerText;

  navigator.share ? navigator.share({text}) : alert(text);
}

</script>

</body>
</html>
