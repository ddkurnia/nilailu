<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seberapa Guna Lu Hari Ini?</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#fef08a,#fde68a);
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

.option{
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  background:white;
  cursor:pointer;
}

.option.active{
  background:#22c55e;
  font-weight:bold;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  font-weight:bold;
}

.hidden{display:none;}

.result{
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.insight{
  font-style:italic;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="landing">
<h1>Seberapa Guna Lu Hari Ini 😈</h1>
<button onclick="start()">Mulai</button>
</div>

<div id="input" class="hidden">

<div class="card">
<h3>Bangun kapan?</h3>
<div class="option" onclick="select(this,20)">Pagi</div>
<div class="option" onclick="select(this,10)">Siang</div>
<div class="option" onclick="select(this,0)">Malam</div>
</div>

<div class="card">
<h3>Pagi</h3>
<div class="option" onclick="toggle(this,5)">Ngopi</div>
<div class="option" onclick="toggle(this,-5)">Tidur lagi</div>
<div class="option" onclick="toggle(this,15)">Kerja</div>
<div class="option" onclick="toggle(this,-10)">Scroll</div>
</div>

<div class="card">
<h3>Siang</h3>
<div class="option" onclick="toggle(this,-5)">Rebahan</div>
<div class="option" onclick="toggle(this,20)">Kerja serius</div>
<div class="option" onclick="toggle(this,-10)">Scroll</div>
</div>

<div class="card">
<h3>Malam</h3>
<div class="option" onclick="toggle(this,-10)">Nonton</div>
<div class="option" onclick="toggle(this,-15)">Scroll chaos</div>
<div class="option" onclick="toggle(this,15)">Lembur</div>
</div>

<button onclick="hitung()">🔥 Nilai Gue</button>

</div>

<div id="result" class="hidden">

<div class="card">
<div id="score" class="result"></div>
<p id="roast"></p>
<p id="insight" class="insight"></p>
</div>

<div id="shareCard" class="card hidden">
<div id="scoreShare" class="result"></div>
<p id="roastShare"></p>
<p id="insightShare"></p>
</div>

<button onclick="share()">🔥 Share</button>
<button onclick="location.reload()">🔁 Ulang</button>

</div>

</div>

<script>

function start(){
  document.getElementById("landing").classList.add("hidden");
  document.getElementById("input").classList.remove("hidden");
}

function select(el,val){
  el.parentNode.querySelectorAll(".option").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  el.dataset.value = val;
}

function toggle(el,val){
  el.classList.toggle("active");
  el.dataset.value = val;
}

function hitung(){
  let total = 0;

  document.querySelectorAll(".option.active").forEach(el=>{
    total += parseInt(el.dataset.value || 0);
  });

  total = Math.max(0, Math.min(100,total));

  let title="", roast="", insight="";

  if(total < 30){
    title="NPC 🤡";
    roast="Hidup... tapi kosong";
    insight="Lu jalan… tapi ke mana?";
  } else if(total < 60){
    title="SIBUK HALU 😵";
    roast="Gerak banyak, hasil dikit";
    insight="Capek doang atau beneran maju?";
  } else if(total < 80){
    title="MASIH MANUSIA 🧍";
    roast="Lumayan lah";
    insight="Udah oke, tapi jangan santai";
  } else {
    title="OVERACHIEVER 😤";
    roast="Lu kerja keras";
    insight="Arah lu jelas nggak?";
  }

  document.getElementById("score").innerText = total+"% - "+title;
  document.getElementById("roast").innerText = roast;
  document.getElementById("insight").innerText = "Hari ini buat lu:\n"+insight;

  document.getElementById("scoreShare").innerText = total+"% - "+title;
  document.getElementById("roastShare").innerText = roast;
  document.getElementById("insightShare").innerText = insight;

  document.getElementById("input").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");
}

function share(){
  const card = document.getElementById("shareCard");
  card.classList.remove("hidden");

  html2canvas(card).then(canvas=>{
    const img = canvas.toDataURL();

    const link = document.createElement("a");
    link.download="hasil.png";
    link.href=img;
    link.click();

    card.classList.add("hidden");
  });
}

</script>

</body>
</html>
