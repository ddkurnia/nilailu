<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seberapa Guna Lu Hari Ini?</title>
<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  width:90%;
  max-width:400px;
  text-align:center;
}
button {
  padding:12px 20px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:black;
  font-weight:bold;
}
.hidden { display:none; }
</style>
</head>
<body>

<div class="container">

<!-- LANDING -->
<div id="landing">
  <h1>Seberapa Guna Lu Hari Ini?</h1>
  <p>Jawab jujur. Kita nilai.</p>
  <button onclick="start()">Mulai</button>
</div>

<!-- INPUT -->
<div id="input" class="hidden">
  <p>Bangun:</p>
  <select id="bangun">
    <option value="20">Sebelum 7</option>
    <option value="10">Sebelum 10</option>
    <option value="0">Siang 😭</option>
  </select>

  <p>Aktivitas:</p>
  <label><input type="checkbox" value="30"> Kerja</label><br>
  <label><input type="checkbox" value="20"> Olahraga</label><br>
  <label><input type="checkbox" value="20"> Belajar</label><br>
  <label><input type="checkbox" value="-10"> Rebahan</label>

  <p>Scroll (jam):</p>
  <input type="range" min="0" max="6" id="scroll">

  <button onclick="hitung()">Nilai Gue</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <h1 id="score"></h1>
  <p id="roast"></p>
  <button onclick="share()">Share</button>
  <button onclick="location.reload()">Ulang</button>
</div>

</div>

<script>
function start(){
  landing.classList.add("hidden");
  input.classList.remove("hidden");
}

function hitung(){
  let total = parseInt(bangun.value);

  document.querySelectorAll('#input input[type=checkbox]:checked')
    .forEach(cb => total += parseInt(cb.value));

  let scrollVal = document.getElementById("scroll").value;
  total -= scrollVal * 5;

  if(total < 0) total = 0;
  if(total > 100) total = 100;

  let roast = "";
  if(total < 30) roast = "NPC energy kuat hari ini";
  else if(total < 60) roast = "Sibuk… tapi nggak jelas ngapain";
  else if(total < 80) roast = "Lumayan, masih manusia";
  else roast = "Overachiever… atau sok sibuk?";

  document.getElementById("score").innerText = total + "%";
  document.getElementById("roast").innerText = roast;

  input.classList.add("hidden");
  result.classList.remove("hidden");
}

function share(){
  let text = document.getElementById("score").innerText + 
  " - " + document.getElementById("roast").innerText;

  navigator.share ? navigator.share({text}) : alert(text);
}
</script>

</body>
</html>
