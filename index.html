<script>
function hitung(){
  let total = 0;

  let bangun = document.getElementById("bangun").value;
  total += parseInt(bangun);

  document.querySelectorAll('input[type=checkbox]:checked')
    .forEach(cb => total += parseInt(cb.value));

  if(total < 0) total = 0;
  if(total > 100) total = 100;

  let roast = "";
  let title = "";

  if(total < 30){
    title = "NPC MODE 🤡";
    roast = "Seharian hidup… tapi kayak nggak ada tujuan 😭";
  }
  else if(total < 60){
    title = "SIBUK HALU 😵";
    roast = "Gerak banyak, hasil minim. Klasik.";
  }
  else if(total < 80){
    title = "MASIH MANUSIA 🧍";
    roast = "Lumayan… nggak malu-maluin banget hari ini.";
  }
  else{
    title = "OVERACHIEVER 😤";
    roast = "Lu kerja beneran… atau lagi kejar validasi?";
  }

  document.getElementById("score").innerText = total + "% - " + title;
  document.getElementById("roast").innerText = roast;
}
</script>
